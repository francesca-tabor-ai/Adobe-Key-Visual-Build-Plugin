<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: sans-serif;
            padding: 16px;
            color: white;
            background-color: #2c2c2c;
        }
        h1 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        .section {
            margin-bottom: 24px;
        }
        button {
            display: block;
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #005a9e;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 8px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #3c3c3c;
            font-family: monospace;
            font-size: 12px;
        }
        .log-panel {
            background-color: #1e1e1e;
            padding: 8px;
            height: 150px;
            overflow-y: auto;
            font-size: 11px;
            font-family: monospace;
            border: 1px solid #3c3c3c;
        }
        .log-entry {
            margin-bottom: 4px;
        }
        .log-info { color: #9cdcfe; }
        .log-warn { color: #ce9178; }
        .log-error { color: #f44747; }
    </style>
</head>
<body>
    <h1>KV BUILD ENGINE</h1>

    <div class="section">
        <label for="jsonSpec">JSON Spec:</label>
        <textarea id="jsonSpec" placeholder="Paste JSON spec here..."></textarea>
        <button id="importJson">Import JSON Spec</button>
    </div>

    <div class="section">
        <button id="createMaster" disabled>Create Master File</button>
        <button id="generateArtboards" disabled>Generate Artboards</button>
        <button id="validateStructure" disabled>Validate Structure</button>
        <button id="saveAsMaster" disabled>Save As Master</button>
    </div>

    <div class="section">
        <label>Logs:</label>
        <div id="logPanel" class="log-panel"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
